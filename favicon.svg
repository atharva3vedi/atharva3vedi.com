    <rect x="8" y="52" width="6" height="6"/><rect x="20" y="52" width="6" height="6"/>
    <rect x="32" y="52" width="6" height="6"/><rect x="44" y="52" width="6" height="6"/>
    <rect x="14" y="46" width="6" height="6"/><rect x="26" y="46" width="6" height="6"/>
    <rect x="38" y="46" width="6" height="6"/><rect x="50" y="46" width="6" height="6"/>
  </g>
  <!-- cat head -->
